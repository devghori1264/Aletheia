app = "aletheia-detector"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"
  [build.args]
    PYTHON_VERSION = "3.11"
    NODE_VERSION = "20"
    NEXT_TELEMETRY_DISABLED = "1"

[processes]
  app = ""

[env]
  ALETHEIA_ENVIRONMENT = "flyio"
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"
  PYTHONPATH = "/app/src"

  DJANGO_SETTINGS_MODULE = "aletheia.settings.flyio"
  DEBUG = "false"

  WEB_CONCURRENCY = "2"
  GUNICORN_THREADS = "4"
  GUNICORN_TIMEOUT = "300"
  GUNICORN_KEEPALIVE = "5"

  CELERY_TASK_ALWAYS_EAGER = "true"
  ML_DEVICE = "cpu"
  ML_PRECISION = "fp32"
  ML_BATCH_SIZE = "4"
  ML_NUM_WORKERS = "2"

  MALLOC_ARENA_MAX = "2"

  LOG_LEVEL = "INFO"
  LOG_FORMAT = "json"

[http_service]
  internal_port = 8000
  force_https = true

  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 8
    hard_limit = 12

  [http_service.http_options]
    response_header_timeout = 300
    idle_timeout = 300

[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  timeout = "10s"
  method = "GET"
  path = "/health/"

  [http_service.checks.headers]
    Host = "aletheia-detector.fly.dev"

[[vm]]
  size = "performance-2x"
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2

[[statics]]
  guest_path = "/app/staticfiles"
  url_prefix = "/static/"

[metrics]
  port = 9091
  path = "/metrics"

[deploy]
  strategy = "rolling"
[experimental]
  auto_rollback = true

kill_signal = "SIGTERM"
kill_timeout = "30s"
