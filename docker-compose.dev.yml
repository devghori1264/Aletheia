# =============================================================================
# Aletheia - Simplified Development Docker Compose
# =============================================================================
# Minimal setup for testing core functionality without ML models
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: aletheia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aletheia
      POSTGRES_USER: aletheia
      POSTGRES_PASSWORD: aletheia_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aletheia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aletheia-network

  # ===========================================================================
  # Redis Cache & Message Broker
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: aletheia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aletheia-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: aletheia-postgres-data
  redis_data:
    name: aletheia-redis-data

# =============================================================================
# Networks
# =============================================================================
networks:
  aletheia-network:
    name: aletheia-network
    driver: bridge
