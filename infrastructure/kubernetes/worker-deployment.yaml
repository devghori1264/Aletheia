---
# Aletheia Worker Deployment (GPU-enabled)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aletheia-worker
  namespace: aletheia
  labels:
    app.kubernetes.io/name: aletheia
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aletheia
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aletheia
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9191"
    spec:
      serviceAccountName: aletheia
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      containers:
        - name: worker
          image: ghcr.io/your-org/aletheia-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - aletheia
            - worker
            - --loglevel=info
            - --concurrency=2
            - -Q
            - default,analysis,high_priority
          
          envFrom:
            - configMapRef:
                name: aletheia-config
            - secretRef:
                name: aletheia-secrets
          
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ML_DEVICE
              value: "cuda"
            - name: ML_PRECISION
              value: "fp16"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - aletheia
                - inspect
                - ping
                - -d
                - celery@$(POD_NAME)
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: aletheia-media
        - name: models
          persistentVolumeClaim:
            claimName: aletheia-models
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      
      nodeSelector:
        accelerator: nvidia-gpu
      
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aletheia
                    app.kubernetes.io/component: worker
                topologyKey: kubernetes.io/hostname
---
# Horizontal Pod Autoscaler for Workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aletheia-worker-hpa
  namespace: aletheia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aletheia-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: External
      external:
        metric:
          name: celery_queue_length
          selector:
            matchLabels:
              queue: analysis
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
# Pod Disruption Budget for Workers
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aletheia-worker-pdb
  namespace: aletheia
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aletheia
      app.kubernetes.io/component: worker
