version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels: ["dependencies", "python", "security"]
    commit-message:
      prefix: "deps(python)"
      include: "scope"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torchvision"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels: ["dependencies", "frontend", "security"]
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    target-branch: "main"
    labels: ["dependencies", "github-actions", "security"]
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
