name: CD - Deploy to Fly.io

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: deploy-fly-production
  cancel-in-progress: false

jobs:
  detect-deploy-scope:
    name: Detect Deployment-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter deployment paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            deploy:
              - 'src/**'
              - 'frontend/**'
              - 'scripts/docker-entrypoint.sh'
              - 'Dockerfile.fly'
              - 'fly.toml'
              - 'pyproject.toml'

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [detect-deploy-scope]
    if: needs.detect-deploy-scope.outputs.should_deploy == 'true'
    timeout-minutes: 30
    environment:
      name: production
      url: https://aletheia-detector.fly.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secret availability
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.FLY_API_TOKEN }}" ]]; then
            echo "FLY_API_TOKEN is not configured in repository/environment secrets."
            exit 1
          fi

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.toml --strategy rolling --wait-timeout 900
