name: CI - Quality, Security, and Build

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "develop", "release/**", "feature/**"]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
      docs: ${{ steps.filter.outputs.docs }}
      app: ${{ steps.compute.outputs.app }}
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'Makefile'
              - 'scripts/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'Dockerfile.fly'
              - 'fly.toml'
              - 'docker-compose*.yml'
              - 'infrastructure/**'
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'Documentation/**'

      - name: Compute gates
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.filter.outputs.backend }}" == "true" || "${{ steps.filter.outputs.frontend }}" == "true" || "${{ steps.filter.outputs.infra }}" == "true" ]]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.backend }}" != "true" && "${{ steps.filter.outputs.frontend }}" != "true" && "${{ steps.filter.outputs.infra }}" != "true" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  secret-scan:
    name: Secret Leak Gate
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  python-quality-and-tests:
    name: Backend Quality + Tests
    runs-on: ubuntu-latest
    needs: [changes, secret-scan]
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 30
    env:
      DJANGO_SETTINGS_MODULE: aletheia.settings.testing
      PYTHONPATH: ./src
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,production]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (black + isort)
        run: |
          black --check src tests
          isort --check-only src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Django deployment checks
        env:
          DJANGO_SECRET_KEY: ci-build-only-secret
        run: python src/manage.py check --deploy --settings=aletheia.settings.flyio

      - name: Run backend tests
        run: pytest -m "not slow"

  frontend-quality-and-tests:
    name: Frontend Quality + Tests
    runs-on: ubuntu-latest
    needs: [changes, secret-scan]
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build-smoke:
    name: Docker Build Smoke Test (Fly)
    runs-on: ubuntu-latest
    needs: [changes, secret-scan]
    if: needs.changes.outputs.app == 'true'
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Fly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fly
          push: false
          tags: aletheia:ci
          build-args: |
            PYTHON_VERSION=3.11
            NODE_VERSION=20
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-container-scan:
    name: Trivy Container Security Scan
    runs-on: ubuntu-latest
    needs: [changes, secret-scan, docker-build-smoke]
    if: needs.changes.outputs.app == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fly
          push: false
          load: true
          tags: aletheia:scan
          build-args: |
            PYTHON_VERSION=3.11
            NODE_VERSION=20
          cache-from: type=gha

      - name: Run Trivy (fail on High/Critical)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "aletheia:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        changes,
        secret-scan,
        python-quality-and-tests,
        frontend-quality-and-tests,
        docker-build-smoke,
        trivy-container-scan,
      ]
    steps:
      - name: Evaluate pipeline status
        shell: bash
        run: |
          set -euo pipefail
          echo "docs_only=${{ needs.changes.outputs.docs_only }}"
          echo "secret-scan=${{ needs.secret-scan.result }}"
          echo "backend=${{ needs.python-quality-and-tests.result }}"
          echo "frontend=${{ needs.frontend-quality-and-tests.result }}"
          echo "docker=${{ needs.docker-build-smoke.result }}"
          echo "trivy=${{ needs.trivy-container-scan.result }}"

          for result in \
            "${{ needs.secret-scan.result }}" \
            "${{ needs.python-quality-and-tests.result }}" \
            "${{ needs.frontend-quality-and-tests.result }}" \
            "${{ needs.docker-build-smoke.result }}" \
            "${{ needs.trivy-container-scan.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "At least one required job failed."
              exit 1
            fi
          done

          echo "CI pipeline completed successfully."
